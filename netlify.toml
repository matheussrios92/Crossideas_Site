[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Garante que /admin redireciona para /admin/ (trailing slash)
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301
  force = true

# Segurança básica para o painel CMS
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
